name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: TerraBreed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept SDK licenses & install NDK 27
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.1.12297006" >/dev/null 2>&1
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> $GITHUB_ENV
          echo "NDK: $(ls $ANDROID_SDK_ROOT/ndk/ 2>/dev/null)"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: 1
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configure Gradle memory
        run: |
          mkdir -p ~/.gradle
          printf 'org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8\n' >> ~/.gradle/gradle.properties
          printf 'org.gradle.daemon=false\n' >> ~/.gradle/gradle.properties
          printf 'org.gradle.parallel=false\n' >> ~/.gradle/gradle.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          echo "Keystore size: $(wc -c < android/app/release.keystore) bytes"

      - name: Build & sign release APK via Gradle
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            -Pandroid.ndkVersion=27.1.12297006 \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            2>&1 | tee /tmp/gradle.log
          echo "=== Build result ==="
          find app/build/outputs/apk -name "*.apk" 2>/dev/null && echo "APK found!" || echo "No APK found"

      - name: Collect APK
        run: |
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "APK found: $APK ($(wc -c < "$APK") bytes)"
          mkdir -p output
          cp "$APK" output/TerraBreed-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TerraBreed-APK
          path: output/TerraBreed-release.apk
          retention-days: 30

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: /tmp/gradle.log
          retention-days: 7
          if-no-files-found: ignore
