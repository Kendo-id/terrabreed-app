name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: TerraBreed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses & install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager             "platforms;android-35"             "build-tools;35.0.0"             "ndk;27.1.12297006" > /dev/null 2>&1
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> $GITHUB_ENV
          echo "NDK installed: $(ls $ANDROID_SDK_ROOT/ndk/ 2>/dev/null || echo NONE)"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: 1
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configure Gradle JVM args
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.configureondemand=false
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/app.keystore

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          ./gradlew assembleRelease             --no-daemon             --stacktrace             -Pandroid.ndkVersion=27.1.12297006             2>&1 | tee /tmp/gradle.log
          echo "Exit code: $?"
          echo "APK files:"
          find . -name "*.apk" 2>/dev/null

      - name: Sign APK
        run: |
          UNSIGNED=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Signing: $UNSIGNED"
          jarsigner -verbose             -sigalg SHA256withRSA             -digestalg SHA-256             -keystore /tmp/app.keystore             -storepass "${{ secrets.KEYSTORE_PASSWORD }}"             -keypass "${{ secrets.KEY_PASSWORD }}"             "$UNSIGNED"             "${{ secrets.KEYSTORE_ALIAS }}"
          echo "APK_PATH=$UNSIGNED" >> $GITHUB_ENV

      - name: Zipalign APK
        run: |
          TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | sort -V | tail -1)
          mkdir -p output
          $TOOLS/zipalign -v 4 "$APK_PATH" output/TerraBreed.apk
          echo "Done: $(ls -lh output/TerraBreed.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TerraBreed-APK
          path: output/TerraBreed.apk
          retention-days: 30

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-log
          path: /tmp/gradle.log
          retention-days: 7
